version: "3.9"

services:
  productservice-api:
    build:
      context: ..
      dockerfile: ProductService/ProductService.Api/Dockerfile
    container_name: productservice-api
    ports:
      - "5000:80"
    depends_on:
      - productservice-db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__Default=Host=productservice-db;Port=5432;Database=productdb;Username=postgres;Password=postgres

  productservice-db:
    image: postgres:16
    container_name: productservice-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=productdb
    ports:
      - "5433:5432"
    volumes:
      - productservice_data:/var/lib/postgresql/data

volumes:
  productservice_data:
